# The URL the site will be built for
base_url = "https://www.thulasirajkomminar.com"
title = "Thulasiraj Komminar"
description = "AWS • Terraform • Programming"

# Default language
default_language = "en"

# The theme the site will be built with
theme = "zap"

# No SASS - CSS is inline
compile_sass = false

# RSS
generate_feeds = true
feed_filenames = ["rss.xml", "atom.xml"]

# Search index enabled
build_search_index = true

# When set to "false", Sitemap.xml is not generated
generate_sitemap = true

taxonomies = [{ name = "tags", feed = true }]

[search]
index_format = "fuse_javascript"
include_title = true
include_description = true
include_content = true

[markdown]

[markdown.highlighting]
light_theme = "github-light"
dark_theme = "github-dark"

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[extra]
# SEO keywords (required by zap's head macro)
keywords = "thulasiraj, komminar, aws, terraform, infrastructure as code, data, programming, iiot, platform engineering, data engineering, software engineering, cloud computing, devops, docker"


# Search page path
search_path = "$BASE_URL/pages/search/"

# Image resizing (responsive images still work)
image_resizing_disabled = false
image_format = "auto"
image_quality = 100
images_default_size = 1024
images_sizes = [512, 1024, 2048]

thumbnail_quality = 100
thumbnail_default_size = 256
thumbnail_sizes = [128, 256]

favicon = "/favicon/TK.png"
favicon_mimetype = "image/png"

# Enable inline SVG icons (uses sprite sheet)
inline_icons = true
icon_path = "static/icons/"
icons = ["home", "search", "light", "rss", "idea", "user-avatar"]

# Zap's navigation uses `menu_links` (not `menu_items`)
menu_links = [
  { url = "$BASE_URL/", name = "Home", icon = "home.svg" },
  { url = "$BASE_URL/pages/about-me", name = "About", icon = "user-avatar.svg" },
  { url = "$BASE_URL/tags/", name = "Tags", icon = "idea.svg" },
  { url = "$BASE_URL/pages/search/", name = "Search", icon = "search.svg" },
]
